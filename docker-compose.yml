# wger — compose "à plat" (sans include:) pour Portainer.
# Équivalent au stack officiel, mais sans la directive `include:` qui déclenche
# l'erreur "services.db conflicts with imported resource" sur les vieilles
# versions de Docker Compose. Les dossiers ./config et ./services/config-powersync
# du dépôt sont toujours nécessaires (ils sont clonés avec le repo).

services:
  web:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    env_file:
      - ./config/prod.env
    volumes:
      - static:/home/wger/static
      - media:/home/wger/media
    expose:
      - 8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      start_period: 300s
      retries: 5
    restart: unless-stopped

  nginx:
    image: docker.io/nginx:stable
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      - web
      - powersync
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/wger/static:ro
      - media:/wger/media:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── depuis services/postgres.yaml + surcharge du compose principal ──
  db:
    image: docker.io/postgres:15-alpine
    shm_size: 256mb
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 5
    env_file:
      - ./config/prod.env
    environment:
      - TZ=America/Toronto
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    expose:
      - 5432
    command: [
      "postgres",
      "-c", "wal_level=logical",
      "-c", "shared_buffers=256MB",
      "-c", "effective_cache_size=768MB",
      "-c", "work_mem=8MB",
      "-c", "random_page_cost=1.1",
      "-c", "max_connections=30"
    ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── depuis services/redis.yaml + surcharge (ajout du volume redis-data) ──
  cache:
    image: docker.io/redis
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    expose:
      - 6379
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── depuis services/powersync.yaml + surcharge (depends_on web) ──
  # PowerSync = moteur de synchro hors-ligne de l'app mobile. On le garde pour
  # rester identique au stack officiel. nginx ne fait que l'attendre au démarrage,
  # donc s'il n'est pas configuré à fond, ça n'empêche pas wger de tourner.
  powersync:
    image: docker.io/journeyapps/powersync-service:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["start", "-r", "unified"]
    volumes:
      - ./services/config-powersync:/config:ro
    env_file:
      - ./config/prod.env
    environment:
      POWERSYNC_CONFIG_PATH: /config/powersync.yaml
      PS_JWKS_URL: http://web:8000/api/v2/powersync-keys
    expose:
      - 8080
      - 9090
    restart: unless-stopped

  celery_worker:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    command: /start-worker
    env_file:
      - ./config/prod.env
    volumes:
      - media:/home/wger/media
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery_beat:
    image: docker.io/wger/server:latest
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    command: /start-beat
    volumes:
      - celery-beat:/home/wger/beat/
    env_file:
      - ./config/prod.env
    depends_on:
      celery_worker:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  celery-beat:
  redis-data:
  media:
  static:

networks:
  default:
    name: wger_network
